<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Quiz Creator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Sanchez&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/admin.css">
    <script src="js/addQuestions.js" defer></script>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            protectPage();
            handleNavProtection();
        });
    </script>
</head>

<body>

    <div class="page-container">

        <div class="quiz-card">

            <h3 class="text-center mb-3 fw-bold">Create Quiz Questions</h3>

            <form id="quizForm">

                <div id="questionContainer">

                    <div class="question-block">
                        <input type="text" class="form-control mb-4" placeholder="Enter question">

                        <h6 class="form-label fw-bold">Options</h6>
                        <input type="text" class="form-control mb-3" placeholder="Option 1">
                        <input type="text" class="form-control mb-3" placeholder="Option 2">
                        <input type="text" class="form-control mb-3" placeholder="Option 3">
                        <input type="text" class="form-control mb-3" placeholder="Option 4">
                    </div>

                </div>

                <!-- Add Question Button -->
                <button type="button" class="add-btn" onclick="addQuestion()">
                    <i class="bi bi-plus-lg"></i>
                </button>

                <div class="text-center mt-4">
                    <button type="submit" class="submit-btn">Save Quiz</button>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
