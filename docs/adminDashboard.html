<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="css/admin.css">
    <script src="js/admin.js" defer></script>

    <script src="js/auth.js" defer></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            protectPage();
            handleNavProtection();
        });
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Sanchez&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


</head>

<body>

    <div class="dashboard-container">

        <div class="topbar">
            <div class="page-title">
                <i class="bi bi-speedometer2"></i>
                <h2>Admin Dashboard</h2>
            </div>

            <div class="logout">
            <button id="logoutBtn" class="btn btn-danger gap-1">
                <i class="bi bi-power"></i>
                Log Out
            </button>
            

            <button class="menu-btn" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                <i class="bi bi-list"></i>
            </button>
            </div>
        </div>

        <div class="stats-grid">

            <div class="dashboard-card">
                <i class="bi bi-people-fill"></i>
                <h3>Total Users</h3>
                <p id="totalUsers"></p>
            </div>

            <div class="dashboard-card">
                <i class="bi bi-ui-checks-grid"></i>
                <h3>Total Quizzes</h3>
                <p id="totalQuizzes"></p>
            </div>

            <div class="dashboard-card">
                <i class="bi bi-lock-fill"></i>
                <h3>Closed Quizzes</h3>
                <p id="closedQuizzes"></p>
            </div>

            <div class="dashboard-card">
                <i class="bi bi-bar-chart-fill"></i>
                <h3>Leaderboard Entries</h3>
                <p id="leaderboardEntries"></p>
            </div>

        </div>

        <div class="table-wrapper mt-5">
            <h4 class="section-heading">Recent Quizzes</h4>

            <div class="grid-table header">
                <div>ID</div>
                <div>Title</div>
                <div>Author</div>
                <div>End Date</div>
            </div>

            <div id="quizTableBody"></div>
        </div>

    </div>


    <div class="offcanvas offcanvas-end" tabindex="1" id="sidebarMenu">

        <div class="offcanvas-header">
            <h5 class="offcanvas-title">
                <a href="adminDashboard.html" class="text-decoration-none text-black">
                <i class="bi bi-grid-fill"></i>
                Admin Dashboard
                </a>
            </h5>

            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">

            <a href="createQuiz.html" class="menu-link">
                <i class="bi bi-plus-circle-fill"></i>
                Create Quiz
            </a>

            <a href="addQuestions.html" class="menu-link">
                <i class="bi bi-plus-circle-fill"></i>
                Add Questions
            </a>

            <a href="manageQuiz.html" class="menu-link">
                <i class="bi bi-pencil-square"></i>
                Manage Quiz
            </a>

            <a href="manageUser.html" class="menu-link">
                <i class="bi bi-people-fill"></i>
                Manage Users
            </a>

            <a href="checkLeaderboard.html" class="menu-link">
                <i class="bi bi-trophy-fill"></i>
                Leaderboard
            </a>

        </div>
    </div>

</body>

</html>
