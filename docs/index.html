<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard</title>

    <!-- Linked Files  -->
    <link rel="stylesheet" href="css/home.css">
    <script src="js/home.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Sanchez&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Websocket for live updates  -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

</head>

<body>

    <header>
        <nav>
            <h2>Quiz Tournament</h2>
            <div>
                <a href="index.html">Home</a>
                <a href="closedQuiz.html" class="protected">Closed Quiz</a>
                <a href="leaderboard.html" class="protected">Leaderboard</a>
                <a href="profile.html" class="protected">Profile</a>
            </div>
        </nav>
    </header>

    <main>

        <div class="welcome-msg">
            <img src="assets/heroImg.png" alt="home image">
            <div class="hero-content">
                <h1>Challenge Your Knowledge</h1>
                <h2>Compete in quizzes, track progress, and sharpen your skills</h2>

                <div class="hero-buttons">
                    <button onclick="document.getElementById('latestSection').scrollIntoView({ behavior: 'smooth' })"
                        class="btn btn-primary">Play Quiz</button>
                    <button onclick="window.location.href = 'login.html'" class="btn btn-secondary">Login /
                        Signup</button>
                </div>
            </div>
        </div>

        <section class="quiz-horizontal" id="latestSection">

            <hr class="section-divider">
            <h2 class="section-title">Latest Quizzes</h2>

            <div class="quiz-list" id="latestList"></div>

        </section>

        <section class="quiz-vertical" id="ongoingSection">

            <hr class="section-divider">
            <h2 class="section-title">Ongoing Quizzes</h2>

            <div class="quiz-list" id="ongoingList"></div>

        </section>


    </main>

    <footer>
        <div class="f-result">
            <a class="q-result" href="closedQuiz.html"><i class="bi bi-trophy-fill"></i> View Quiz Result</a>
        </div>
        <p class="copyright">&copy; 2026 Quiz Tournament</p>
    </footer>

</body>

</html>
