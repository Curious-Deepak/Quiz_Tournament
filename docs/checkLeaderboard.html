<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Sanchez&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/admin.css">
    <script src="js/checkLeaderboard.js" defer></script>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            protectPage();
            handleNavProtection();
        });
    </script>

</head>

<body>

    <div class="page-container">

        <div class="page-header">
            <i class="bi bi-trophy-fill win-icon" onclick="goHome()"></i>
            <h2>Leaderboard</h2>
        </div>

        <div class="table-wrapper">
            <div class="search-wrapper">

                <h4 class="mb-0 fw-bold">
                    Overall User Standings
                </h4>

                <input type="text" id="searchInput" class="form-control" style="width: 250px; flex-shrink: 0;"
                    placeholder="Search users...">

            </div>

            <div class="leaderboard-header">
                <div>Rank</div>
                <div>User Name</div>
                <div>Quiz Title</div>
                <div>Score</div>
                <div>Accuracy</div>
            </div>

            <div id="leaderboardBody">
            </div>

        </div>
    </div>

</body>

</html>
