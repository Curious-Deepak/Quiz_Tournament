<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/login.css">
    <script src="js/login.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Sanchez&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

    <div class="container" id="container">

        <div class="panel form-panel">

            <!-- LOGIN FORM -->
            <form class="form login-form" id="loginForm">

                <h2>Login</h2>

                <input type="email" id="loginEmail" name="email" placeholder="Email" required>

                <div class="password-field">
                    <input type="password" id="loginPassword" name="password" placeholder="Password" required>
                    <i class="bi bi-eye-slash togglePassword" data-target="loginPassword"></i>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>
                </div>

                <div id="loginError" class="error-text"></div>

                <button type="submit">Login</button>

                <p class="switch">
                    New here?
                    <span onclick="showSignup()">Sign Up</span>
                </p>

            </form>

            <!-- SIGNUP FORM -->
            <form class="form signup-form" id="signupForm">

                <h2>Create Account</h2>

                <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
                <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
                <input type="email" id="signupEmail" name="email" placeholder="Email" required>

                <div class="password-field">
                    <input type="password" id="signupPassword" name="password" placeholder="Password" required>
                    <i class="bi bi-eye-slash togglePassword" data-target="signupPassword"></i>
                </div>

                <div id="signupError" class="error-text"></div>

                <button type="submit">Sign Up</button>

                <p class="switch">
                    Already have an account?
                    <span onclick="showLogin()">Log In</span>
                </p>

            </form>

        </div>


        <!-- IMAGE PANEL -->
        <div class="panel image-panel">
            <img src="assets/login_img.png" alt="Login & Signup Illustration">
        </div>

    </div>

</body>

</html>
