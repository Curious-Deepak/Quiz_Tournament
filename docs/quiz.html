<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>

    <link rel="stylesheet" href="css/quiz.css">
    <script src="js/quiz.js" defer></script>
    
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            protectPage();
            handleNavProtection();
        });
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Sanchez&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

    <header>
        <h2 id="top-heading">Quiz Tournament</h2>
    </header>

    <main>

        <div class="quiz-heading">
            <img src="assets/q-img.png" class="quiz-logo">
            <div>
                <h2 id="quiz-title"></h2>
            </div>
        </div>

        <div class="quiz-container" id="quiz-container">

            <div class="sidebar-nav">

                <!-- Sidebar Navigation -->
                <aside class="sidebar">
                    <h3>Total Questions : <span id="total-count"></span></h3>
                    <div id="number-grid" class="grid"></div>
                    <div class="legend">
                        <p><span class="box answered"></span> ANSWERED</p>
                        <p><span class="box skipped"></span> SKIPPED</p>
                    </div>
                    <div class="disclaimer">
                        <strong>DISCLAIMER</strong><br>
                        Please do not <span>Close</span> or <span>Refresh</span> this page, otherwise you cannot attempt
                        the
                        quiz again.
                    </div>
                </aside>

                <!-- Main Quiz Area -->
                <div class="main-content">
                    <div class="q-header-left">
                        <div class="q-circle" id="current-q-num">1</div>
                        <h2>Question</h2>
                    </div>
                    <div class="timer-container">
                        <span id="timer">00:00</span>
                    </div>

                    <section class="question-section">
                        <p id="question-text">Loading question...</p>
                        <div id="options-container" class="options-list">
                            <!-- Options will be injected by JS -->
                        </div>
                    </section>

                    <div class="controls">
                        <button class="btn-skip" id="btn-skip" onclick="skipQuestion()">Skip</button>
                        <div class="right-btns">
                            <button class="btn-back" id="btn-back" onclick="prevQuestion()">Back</button>
                            <button id="next-btn" onclick="nextQuestion()">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer>
        <p class="footer-bottom">&copy; 2026 Quiz Tournament</p>
    </footer>

</body>

</html>
