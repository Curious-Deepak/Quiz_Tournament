<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>

    <link rel="stylesheet" href="css/quiz.css">
    <script src="js/quiz.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Sanchez&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <header>
        <h2 id="top-heading">Quiz Tournament</h2>
    </header>

    <main>

        <div class="quiz-container" id="quiz-container">


            <div class="sidebar-nav">

                <!-- Sidebar Navigation -->
                <aside class="sidebar">
                    <h3>Total Questions : <span id="total-count"></span></h3>
                    <div id="number-grid" class="grid"></div>
                    <div class="legend">
                        <p><span class="box answered"></span> ANSWERED</p>
                        <p><span class="box skipped"></span> SKIPPED</p>
                    </div>
                    <div class="disclaimer">
                        <strong>DISCLAIMER</strong><br>
                        Please do not <span>Close</span> or <span>Refresh</span> this page, otherwise you cannot attempt
                        the
                        quiz again.
                    </div>
                </aside>

                <!-- Main Quiz Area -->
                <div class="main-content">
                    <div class="q-header-left">
                        <div class="q-circle" id="current-q-num">1</div>
                        <h2>Question</h2>
                    </div>
                    <div class="timer-container">
                        <span id="timer">05:00</span>
                    </div>

                    <section class="question-section">
                        <p id="question-text">Loading question...</p>
                        <div id="options-container" class="options-list">
                            <!-- Options will be injected by JS -->
                        </div>
                    </section>

                    <div class="controls">
                        <button class="btn-skip" onclick="skipQuestion()">Skip</button>
                        <div class="right-btns">
                            <button class="btn-back" onclick="prevQuestion()">Back</button>
                            <button id="next-btn" onclick="nextQuestion()">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-container" class="result-container">

            <div class="result-card">

                <!-- Trophy Icon -->
                <div class="trophy">
                    <i class="bi bi-trophy-fill"></i>
                </div>

                <h1 class="points" id="points">290</h1>
                <p class="points-label">POINTS EARNED</p>

                <!-- Message -->
                <h2 class="message">
                    <i class="bi bi-lightning-charge-fill"></i> KEEP GOING
                </h2>

                <!-- Stats -->
                <div class="stats">
                    <div>
                        <h3 id="correct">1</h3>
                        <p><i class="bi bi-check-circle-fill correct"></i>CORRECT</p>
                    </div>
                    <div>
                        <h3 id="wrong">4</h3>
                        <p><i class="bi bi-x-circle-fill wrong"></i>WRONG</p>
                    </div>
                    <div>
                        <h3 id="accuracy">20%</h3>
                        <p><i class="bi bi-graph-up accuracy"></i>ACCURACY</p>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="result-buttons">
                    <button class="btn leaderboard" onclick="goToLeaderboard()">
                        <i class="bi bi-bar-chart-fill"></i>LEADERBOARD
                    </button>

                    <button class="btn play" onclick="goToHome()">
                        <i class="bi bi-play-fill"></i>PLAY QUIZ
                    </button>
                </div>

            </div>

        </div>

    </main>


    <footer>
        <p class="footer-bottom">&copy; 2026 Quiz Tournament</p>
    </footer>

</body>

</html>
