<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Quiz</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Sanchez&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/admin.css">
    <script src="js/manageQuiz.js" defer></script>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            protectPage();
            handleNavProtection();
        });
    </script>
</head>

<body>

    <div class="page-container">

        <div class="page-header">
            <i class="bi bi-pencil-square win-icon" onclick="goHome()"></i>
            <h2>Manage Quiz</h2>
        </div>

        <div class="table-wrapper">
            <div class="search-wrapper">

                <h4 class="fw-bold">
                    All Quizzes
                </h4>

                <input type="text" id="searchInput" class="form-control" placeholder="Search quizzes...">

            </div>
            <div class="manage-table header">
                <div>ID</div>
                <div>Title</div>
                <div>Author</div>
                <div>End Date</div>
                <div>Action</div>
            </div>

            <div id="manageQuizBody"></div>
        </div>

    </div>

    <div class="modal fade" id="editQuizModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content p-3">

                <h5 class="text-center fw-bold mb-3">Edit Quiz</h5>

                <input type="hidden" id="editQuizId">

                <label class="form-label">Quiz Title</label>
                <input type="text" id="editTitle" class="form-control mb-2">

                <label class="form-label">End Date</label>
                <input type="date" id="editEndDate" class="form-control mb-2">

                <label class="form-label">Duration (sec)</label>
                <input type="number" id="editDuration" class="form-control mb-2">

                <label class="form-label">Author</label>
                <input type="text" id="editAuthor" class="form-control mb-4">

                <button class="btn btn-success w-100" onclick="saveQuizUpdate()">
                    Save Changes
                </button>

            </div>
        </div>
    </div>



</body>

</html>
