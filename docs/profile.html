<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    
    <link rel="stylesheet" href="css/profile.css">
    <script src="js/profile.js" defer></script>

    <!-- Login Check  -->
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            protectPage();
            handleNavProtection();
        });
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Sanchez&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body>

    <header>
        <nav>
            <h2>Quiz Hub</h2>
            <div>
                <a href="index.html">Home</a>
                <a href="closedQuiz.html">Closed Quiz</a>
                <a href="leaderboard.html">Leaderboard</a>
                <a href="profile.html">Profile</a>

            </div>
        </nav>
    </header>

    <main>

        <div class="profile-layout">

            <!-- LEFT SIDE -->
            <div class="profile-left">

                <!-- Account Section -->
                <div class="account-box">
                    <h3>MY ACCOUNT</h3>

                    <div class = "user-info">
                        <div class = "profile-icon">
                            <i class = "bi bi-person-circle"></i>
                            <i class = "bi bi-pencil-fill edit-icon"></i>
                        </div>

                        <div class = "user-data">
                            <h2 id="user-name"></h2>
                            <p><span id="user-email"></span></p>
                        </div>
                    </div>
                </div>

                <!-- Badges -->
                <div class="badges-box">
                    <h3>MY BADGES</h3>

                    <div class="badge-content">
                        <i class="bi bi-award-fill badge-icon"></i>

                        <div class="badge-data">
                            <h2 id="total-quizzes"></h2>
                            <p id="badge-level"></p>
                        </div>
                    </div>

                    <div class="points">
                        <span>Quiz Points :</span>
                        <span id="total-points"></span>
                    </div>
                </div>

                <!-- Links -->
                <div class="profile-links">
                    <p class="active-link" id="active-tab">Activities on Quiz<i class="bi bi-chevron-right"></i>
                    </p>
                    <p id="past-tab">View Past Quiz Activities<i class="bi bi-chevron-right"></i>
                    </p>
                </div>

            </div>

            <!-- RIGHT SIDE -->
            <div class="profile-right">

                <h2 class="activity-title">ACTIVITIES ON QUIZ</h2>

                <!-- Table -->
                <div class="activity-header">
                    <span>Quiz Name</span>
                    <span>Participated On</span>
                    <span>Accuracy</span>
                </div>

                <!-- Activities -->
                <div id="activity-container"></div>
              
            </div>
        </div>

    </main>

    <footer>
        <p class="footer-bottom">&copy; 2026 Quiz hub</p>
    </footer>
    
</body>

</html>
