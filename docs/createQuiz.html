<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sanchez&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/admin.css">
    <script src="js/createQuiz.js" defer></script>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            protectPage();
            handleNavProtection();
        });
    </script>

</head>

<body>

    <div class="page-container">

        <div class="page-header">
            <i class="bi bi-plus-square-fill win-icon" onclick="goHome()"></i>
            <h2>Create Quiz</h2>
        </div>

        <div class="quiz-card">
            <h4 class="mb-3 fw-bold">Create New Quiz</h4>

            <form id="quizForm">

                <div class="row">

                    <div class="col-md-6 mb-4">
                        <label class="form-label">
                            Quiz Title
                            <span class="required">*</span>
                        </label>
                        <input type="text" class="form-control" id="title" required>
                        <small class="text-muted d-block mt-2">
                            Add small informative title max 4 words
                        </small>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">
                            Author
                            <span class="required">*</span>
                        </label>
                        <input type="text" class="form-control" id="author" required>
                    </div>

                    <div class="col-12 mb-4">
                        <label class="form-label">
                            Description
                            <span class="required">*</span>
                        </label>
                        <textarea class="form-control" rows="4" id="description" required></textarea>
                        <small class="text-muted d-block mt-2">
                            Description should not exceed 35 words
                        </small>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">
                            Number Of Questions
                            <span class="required">*</span>
                        </label>
                        <input type="number" class="form-control" id="noOfQuestions" min=1 required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">
                            Duration In Seconds
                            <span class="required">*</span>
                        </label>
                        <input type="number" class="form-control" id="duration" min=1 required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label class="form-label">
                            Image URL
                        </label>
                        <input type="file" class="form-control" id="imgUrl" accept="image/*">
                        <small class="text-muted d-block mt-2">
                            Try to keep image size above 1100px x 700px
                        </small>
                    </div>

                    <div class="col-md-3 mb-4">
                        <label class="form-label">
                            Start Date
                            <span class="required">*</span>
                        </label>
                        <input type="date" class="form-control" id="startDate" required>
                    </div>

                    <div class="col-md-3 mb-4">
                        <label class="form-label">
                            End Date
                            <span class="required">*</span>
                        </label>
                        <input type="date" class="form-control" id="endDate" required>
                    </div>

                </div>

                <button type="submit" class="submit-btn">
                    <i class="bi bi-check-circle-fill"></i>
                    Create Quiz
                </button>

            </form>

        </div>

    </div>

</body>

</html>
